name: Translate Japanese Shards

on:
  workflow_dispatch:
    inputs:
      shards:
        description: 'Shards to translate (comma-separated)'
        required: false
        default: 'ja-011,ja-012,ja-013'

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Translate Shards
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          node translate-ja.mjs ${{ github.event.inputs.shards }}
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: translated-shards
          path: build/cache/out/ja-*.json
          retention-days: 1
