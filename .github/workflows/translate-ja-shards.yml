name: Translate Japanese Shards

on:
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Translate ja-011
        env:
          AGNES_KEY: ${{ secrets.AGNES_KEY }}
        run: node translate-shard.mjs ja-011
      
      - name: Translate ja-012
        env:
          AGNES_KEY: ${{ secrets.AGNES_KEY }}
        run: node translate-shard.mjs ja-012 ja
      
      - name: Translate ja-013
        env:
          AGNES_KEY: ${{ secrets.AGNES_KEY }}
        run: node translate-shard.mjs ja-013 ja
      
      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add build/cache/out/ja-*.json
          git commit -m "Translate ja-011, ja-012, ja-013 shards" || echo "No changes to commit"
          git push
