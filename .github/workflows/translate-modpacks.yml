on:
  # Weekly cron job: refresh the top popular modpacks and translate them.
  schedule:
  - cron: 0 22 * * 1
  workflow_dispatch:
    inputs:
      top_limit:
        description: "How many top modpacks to fetch from Modrinth"
        required: false
        default: "100"
name: Translate modpacks
jobs:
  translate-modpacks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Translate top modpacks
        run:
          node ./translate-modpacks.mjs
        env:
          AGNES_KEY: ${{ secrets.AGNES_KEY }}
          TOP_LIMIT: ${{ github.event.inputs.top_limit || '100' }}
      - name: Send PR
        id: create_pull_request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Translate top modpacks"
          title: "Translate top modpacks"
          body: "Add and translate the top popular modpacks from Modrinth."
          branch: "translate-modpacks"
          base: "main"
          labels: "traslate"
          draft: false
